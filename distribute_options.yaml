output: dist/
releases:
  - name: production
    jobs:
      - name: release-android-apk
        package:
          platform: android
          target: apk
      - name: release-linux-appimage
        package:
          platform: linux
          target: appimage
      - name: release-linux-deb
        package:
          platform: linux
          target: deb
      - name: release-macos-dmg
        package:
          platform: macos
          target: dmg
      - name: release-windows-exe
        package:
          platform: windows
          target: exe
